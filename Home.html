<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M Database</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f3f3;
      color: #202124;
    }

    .topbar {
      background: #3f444d;
      color: #ffffff;
      height: 88px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar-home {
      justify-self: start;
    }

    .topbar-home a {
      color: #ffffff;
      text-decoration: none;
      font-size: 22px;
      font-weight: 500;
    }

    .topbar-title {
      justify-self: center;
      text-align: center;
      font-size: 22px;
      font-weight: 500;
      white-space: nowrap;
    }

    .topbar-user {
      justify-self: end;
      position: relative;
    }

    .user-menu-btn {
      border: none;
      background: transparent;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-icon {
      font-size: 22px;
      line-height: 1;
    }

    .user-dropdown {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      min-width: 190px;
      background: #ffffff;
      color: #202124;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      padding: 10px;
      z-index: 1000;
    }

    .user-dropdown-name {
      font-size: 16px;
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid #ececec;
      margin-bottom: 8px;
    }

    .logout-btn {
      width: 100%;
      border: none;
      background: #f5f5f5;
      color: #d71920;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: left;
    }

    .logout-btn:hover {
      background: #ececec;
    }

    .hero {
      position: relative;
      height: 455px;
      background-image:
        linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0.10)),
        url("https://speedwaymedia.com/wp-content/uploads/2022/12/2012-E90-BMW-M3-CRT.jpg");
      background-repeat: no-repeat;
      background-position: center 24%;
      background-size: 92%;
      background-color: #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .search-panel {
      width: 100%;
      max-width: 1100px;
      background: #f4f4f4;
      border-radius: 18px;
      padding: 28px 30px 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
    }

    .search-title {
      font-size: 30px;
      font-weight: 700;
      color: #d94831;
      margin-bottom: 22px;
    }

    .search-row {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 68px;
      border: none;
      outline: none;
      border-radius: 8px;
      background: #dcdde1;
      padding: 0 64px 0 22px;
      font-size: 22px;
      color: #222;
    }

    .search-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      font-size: 26px;
      cursor: pointer;
      color: #4a4a4a;
    }

    .hero-recent {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 1px 6px rgba(0,0,0,0.45);
      text-align: center;
      padding: 0 12px;
    }

    .page {
      max-width: 1760px;
      margin: 0 auto;
      padding: 24px 36px 60px;
    }

    .panel {
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 18px;
      padding: 22px 24px 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .left-controls {
      display: flex;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      overflow: hidden;
      min-width: 340px;
    }

    .control-btn {
      border: none;
      background: #fff;
      color: #1f1f1f;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 34px;
      cursor: pointer;
      min-width: 150px;
    }

    .control-btn.active {
      background: #1f73ff;
      color: #fff;
    }

    .right-controls {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .filter-box {
      min-width: 200px;
      background: #efefef;
      color: #222;
      font-size: 18px;
      font-weight: 700;
      border-radius: 6px;
      padding: 16px 20px;
      text-align: center;
    }

    .divider {
      border-top: 1px solid #e2e2e2;
      margin-bottom: 10px;
    }

    .results-header {
      display: grid;
      grid-template-columns: 1.7fr 1.25fr 0.8fr 1.3fr 1.3fr;
      gap: 16px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      color: #5a5a5a;
      padding: 12px 14px;
      border-bottom: 1px solid #ececec;
    }

    .result-row {
      display: grid;
      grid-template-columns: 1.7fr 1.25fr 0.8fr 1.3fr 1.3fr;
      gap: 16px;
      align-items: center;
      padding: 16px 14px;
      border-bottom: 1px solid #ececec;
      font-size: 16px;
      text-decoration: none;
      color: inherit;
    }

    .result-row:hover {
      background: #f7f9fc;
    }

    .result-main {
      font-weight: 700;
      color: #1f1f1f;
      word-break: break-word;
    }

    .result-cell {
      color: #333;
      word-break: break-word;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .results-header,
      .result-row {
        grid-template-columns: 1.4fr 1.1fr 0.8fr 1.1fr 1.1fr;
      }

      .filter-box {
        min-width: 160px;
      }
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
        height: auto;
        gap: 10px;
        padding: 16px;
      }

      .topbar-home,
      .topbar-title,
      .topbar-user {
        justify-self: center;
      }

      .topbar-title {
        white-space: normal;
        font-size: 20px;
      }

      .page {
        padding: 18px 14px 40px;
      }

      .toolbar {
        align-items: stretch;
      }

      .left-controls {
        min-width: unset;
        width: 100%;
      }

      .right-controls {
        width: 100%;
      }

      .filter-box {
        flex: 1 1 140px;
        min-width: 140px;
      }

      .hero {
        height: 400px;
        background-position: center 28%;
        background-size: cover;
      }

      .search-panel {
        padding: 22px 18px 16px;
      }

      .search-title {
        font-size: 25px;
      }

      .search-input {
        height: 58px;
        font-size: 18px;
      }

      .hero-recent {
        font-size: 16px;
      }
    }

    @media (max-width: 760px) {
      .results-header {
        display: none;
      }

      .result-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .result-cell::before {
        content: attr(data-label) ": ";
        font-weight: 700;
        color: #555;
      }

      .hero {
        height: 340px;
        background-position: center 30%;
        background-size: cover;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-home">
      <a href="Home.html">Home</a>
    </div>

    <div class="topbar-title">
      F87 M2 U.S &nbsp;|&nbsp; U.S Database
    </div>

    <div class="topbar-user">
      <button id="userMenuBtn" class="user-menu-btn" type="button">
        <span id="authUsername">admin</span>
        <span class="user-icon">👤</span>
      </button>

      <div id="userDropdown" class="user-dropdown hidden">
        <div class="user-dropdown-name" id="authUsernameDropdown">admin</div>
        <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="search-panel">
      <div class="search-title">Vehicle Inquiry</div>

      <div class="search-row">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="Search for VIN, last 7, color, interior, or year"
        />
        <button id="searchBtn" class="search-btn" type="button">⌕</button>
      </div>
    </div>

    <div class="hero-recent" id="recentSearches">Recent searches: None</div>
  </section>

  <main class="page">
    <section class="panel">
      <div class="section-title">My BMW Series</div>

      <div class="toolbar">
        <div class="left-controls">
          <button class="control-btn active" type="button">Grouped</button>
          <button class="control-btn" type="button">A-Z ▼</button>
        </div>

        <div class="right-controls">
          <div class="filter-box">BMW M SERIES</div>
          <div class="filter-box">DATABASES</div>
          <div class="filter-box">CSV FILES</div>
          <div class="filter-box">OPEN</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="results-header">
        <div>Series</div>
        <div>Generation</div>
        <div>Body Style</div>
        <div>CSV File</div>
        <div>Open</div>
      </div>

      <a class="result-row" href="f87-m2-database.html">
        <div class="result-main">F87 M2</div>
        <div class="result-cell" data-label="Generation">F87</div>
        <div class="result-cell" data-label="Body Style">Coupe</div>
        <div class="result-cell" data-label="CSV File">2016 F87 M2.csv / 2017 F87 M2.csv</div>
        <div class="result-cell" data-label="Open" style="color:#1f73ff; font-weight:700;">Open</div>
      </a>

      <a class="result-row" href="e90-m3-database.html">
        <div class="result-main">E90 M3</div>
        <div class="result-cell" data-label="Generation">E90</div>
        <div class="result-cell" data-label="Body Style">Sedan</div>
        <div class="result-cell" data-label="CSV File">E90 M3 Data.csv</div>
        <div class="result-cell" data-label="Open" style="color:#1f73ff; font-weight:700;">Open</div>
      </a>
    </section>
  </main>

  <script>
    const CSV_FILES = [
      "2016 F87 M2.csv",
      "2017 F87 M2.csv"
    ];

    const recentTerms = [];

    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const recentSearches = document.getElementById("recentSearches");

    const userMenuBtn = document.getElementById("userMenuBtn");
    const userDropdown = document.getElementById("userDropdown");
    const authUsername = document.getElementById("authUsername");
    const authUsernameDropdown = document.getElementById("authUsernameDropdown");
    const logoutBtn = document.getElementById("logoutBtn");

    function updateRecent(term) {
      if (!term.trim()) return;

      const existingIndex = recentTerms.indexOf(term);
      if (existingIndex !== -1) recentTerms.splice(existingIndex, 1);

      recentTerms.unshift(term);
      if (recentTerms.length > 3) recentTerms.pop();

      recentSearches.textContent = "Recent searches: " + recentTerms.join(" | ");
    }

    function runSearch() {
      const term = searchInput.value.trim();
      if (!term) return;
      updateRecent(term);
    }

    searchBtn.addEventListener("click", runSearch);

    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter") runSearch();
    });

    userMenuBtn.addEventListener("click", function (event) {
      event.stopPropagation();
      userDropdown.classList.toggle("hidden");
    });

    document.addEventListener("click", function (event) {
      if (!userDropdown.contains(event.target) && !userMenuBtn.contains(event.target)) {
        userDropdown.classList.add("hidden");
      }
    });

    // Replace this with your actual Auth Pro user/session value if available
    const currentUserName =
      window.authUserName ||
      window.AuthProUserName ||
      localStorage.getItem("authUsername") ||
      "admin";

    authUsername.textContent = currentUserName;
    authUsernameDropdown.textContent = currentUserName;

    logoutBtn.addEventListener("click", function () {
      // Replace this with your actual Auth Pro logout method if needed
      if (window.authPro && typeof window.authPro.logout === "function") {
        window.authPro.logout();
        return;
      }

      if (window.AuthPro && typeof window.AuthPro.logout === "function") {
        window.AuthPro.logout();
        return;
      }

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
